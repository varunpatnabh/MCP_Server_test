services:
  - type: web
    name: stock-mcp-server
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1 --proxy-headers
    envVars:
      - key: PORT
        value: 10000
    healthCheckPath: /health
